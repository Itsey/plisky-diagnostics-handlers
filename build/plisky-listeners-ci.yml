# ASP.NET Core (.NET Framework)
# Build and test ASP.NET Core projects targeting the full .NET Framework.
# Add steps that publish symbols, save build artifacts, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/dotnet-core


trigger: none

pool:
 name: 'FarawayLand'  

variables:
  solution: '$(build.sourcesDirectory)\src\PliskyListeners_Publish.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'
  buildVersionNumber: '0.0.0.0'

steps:
- task: NuGetToolInstaller@1

- task: NuGetCommand@2
  inputs:
    restoreSolution: '$(solution)'
    restoreDirectory: '$(build.sourcesDirectory)\packages\'


- task: PowerShell@2
  displayName: 'CI Versioning'
  condition: not(eq(variables['Build.Reason'],'PullRequest'))
  inputs:
      targetType: 'inline'
      script: |
            # Versioning Powershell - If this is a CI commit then apply the versioning.
            c:\Files\BuildTools\PliskyVersioner\PliskyTool.exe UpdateFiles -NO -Root=$(build.sourcesDirectory)\src\ `-VS=c:\Files\BuildTools\VersionStore\pliskydiagnostics.vstore -Increment `-MM=$(build.sourcesDirectory)\src\_Dependencies\automation\AutoVersion.txt
            c:\Files\BuildTools\PliskyVersioner\PliskyTool.exe Passive `-VS=c:\Files\BuildTools\VersionStore\pliskydiagnostics.vstore -O=Azdo:buildVersionNumber          
            

- task: PowerShell@2
  displayName: 'PR Versioning'
  condition: eq(variables['Build.Reason'],'PullRequest')
  inputs:
      targetType: 'inline'
      script: |
            # Versioning Powershell - Queue Next Increment, but do not actually version the files.  
            c:\Files\BuildTools\PliskyVersioner\PliskyTool.exe Override `-VS=c:\Files\BuildTools\VersionStore\plisky-diagnostics-handlers.vstore `-Q=..+.0
      
- task: PowerShell@2
  inputs:
      targetType: 'inline'
      script: |
          Write-Host "CI Build for $(buildVersionNumber) - Active."

- task: VSBuild@1
  inputs:
    solution: '$(solution)'
    msbuildArgs: '/p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:DesktopBuildPackageLocation="$(build.artifactStagingDirectory)\WebApp.zip" /p:DeployIisAppPath="Default Web Site"'
    platform: '$(buildPlatform)'
    configuration: '$(buildConfiguration)'

- task: DotNetCoreCLI@2
  displayName: 'Runnig Tests - $(buildConfiguration)'
  inputs:
    command: 'test'
    arguments: '--no-build --configuration $(buildConfiguration)'
    publishTestResults: true


#- task: VSTest@2
#  inputs:
#    platform: '$(buildPlatform)'
#    configuration: '$(buildConfiguration)'
#    testAssemblyVer2: |
#      **\*Listeners.Test*.dll\n!**\*TestAdapter.dll\n!**\obj\**
          
- task: PowerShell@2
  displayName: 'Build Complete.'
  inputs:
      targetType: 'inline'
      script: |
            # Test That The Versioning Update Worked
            Write-Host "Complete."
